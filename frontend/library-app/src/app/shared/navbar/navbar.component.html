<!-- Top Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <!-- Brand Logo -->
    <a class="navbar-brand" routerLink="/books">
      <i class="bi bi-book-half me-2"></i>
      Library Management
    </a>

    <!-- Mobile Toggle Button -->
    <button class="navbar-toggler" type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Nav Links -->
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">

        <!-- Books — visible to all -->
        <li class="nav-item">
          <a class="nav-link" routerLink="/books" routerLinkActive="active">
            <i class="bi bi-book me-1"></i>Books
          </a>
        </li>

        <!-- User Dashboard — visible to logged in users -->
        <li class="nav-item" *ngIf="isLoggedIn() && !isAdmin()">
          <a class="nav-link" routerLink="/user-dashboard" routerLinkActive="active">
            <i class="bi bi-speedometer2 me-1"></i>My Dashboard
          </a>
        </li>

        <!-- Admin Dashboard — visible to Admin only -->
        <li class="nav-item" *ngIf="isAdmin()">
          <a class="nav-link" routerLink="/admin-dashboard" routerLinkActive="active">
            <i class="bi bi-gear me-1"></i>Admin Dashboard
          </a>
        </li>

      </ul>

      <!-- Right Side -->
      <ul class="navbar-nav ms-auto">

        <!-- Not logged in → show Login & Register -->
        <ng-container *ngIf="!isLoggedIn()">
          <li class="nav-item">
            <a class="nav-link" routerLink="/login" routerLinkActive="active">
              <i class="bi bi-box-arrow-in-right me-1"></i>Login
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/register" routerLinkActive="active">
              <i class="bi bi-person-plus me-1"></i>Register
            </a>
          </li>
        </ng-container>

        <!-- Logged in → show username & logout -->
        <ng-container *ngIf="isLoggedIn()">
          <li class="nav-item">
            <span class="nav-link text-warning">
              <i class="bi bi-person-circle me-1"></i>
              {{ getUserName() }}
            </span>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" (click)="logout()">
              <i class="bi bi-box-arrow-left me-1"></i>Logout
            </a>
          </li>
        </ng-container>

      </ul>
    </div>
  </div>
</nav>
