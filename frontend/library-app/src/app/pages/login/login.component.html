<!-- Login Page -->
<div class="login-page">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-80">
      <div class="col-md-5">

        <!-- Login Card -->
        <div class="card login-card">
          <div class="card-body p-5">

            <!-- Header -->
            <div class="text-center mb-4">
              <i class="bi bi-book-half login-icon"></i>
              <h3 class="mt-2 fw-bold">Welcome Back!</h3>
              <p class="text-muted">Sign in to Library Management System</p>
            </div>

            <!-- Error Alert -->
            <div class="alert alert-danger" *ngIf="errorMessage">
              <i class="bi bi-x-circle me-2"></i>
              {{ errorMessage }}
            </div>

            <!-- Login Form -->
            <form (ngSubmit)="onLogin()">

              <!-- Email Field -->
              <div class="mb-3">
                <label class="form-label fw-semibold">
                  <i class="bi bi-envelope me-1"></i>Email
                </label>
                <input
                  type="email"
                  class="form-control"
                  placeholder="Enter your email"
                  [(ngModel)]="loginData.email"
                  name="email"
                  required>
              </div>

              <!-- Password Field -->
              <div class="mb-4">
                <label class="form-label fw-semibold">
                  <i class="bi bi-lock me-1"></i>Password
                </label>
                <div class="input-group">
                  <input
                    [type]="showPassword ? 'text' : 'password'"
                    class="form-control"
                    placeholder="Enter your password"
                    [(ngModel)]="loginData.password"
                    name="password"
                    required>
                  <!-- Show/Hide Password -->
                  <button
                    class="btn btn-outline-secondary"
                    type="button"
                    (click)="togglePassword()">
                    <i class="bi"
                      [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'">
                    </i>
                  </button>
                </div>
              </div>

              <!-- Login Button -->
              <button
                type="submit"
                class="btn btn-dark w-100 py-2"
                [disabled]="isLoading">
                <span *ngIf="isLoading">
                  <span class="spinner-border spinner-border-sm me-2"></span>
                  Signing in...
                </span>
                <span *ngIf="!isLoading">
                  <i class="bi bi-box-arrow-in-right me-2"></i>
                  Sign In
                </span>
              </button>

            </form>

            <!-- Register Link -->
            <div class="text-center mt-4">
              <p class="text-muted">
                Don't have an account?
                <a routerLink="/register" class="text-dark fw-semibold">
                  Register here
                </a>
              </p>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>
</div>
