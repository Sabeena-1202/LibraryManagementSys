<!-- Book List Page -->
<div class="book-list-page">
  <div class="container py-4">

    <!-- Page Header -->
    <div class="row mb-4">
      <div class="col-md-8">
        <h2 class="fw-bold">
          <i class="bi bi-book me-2"></i>Library Books
        </h2>
        <p class="text-muted">Browse and borrow books from our collection</p>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="row mb-4">
      <div class="col-md-6">
        <div class="input-group">
          <span class="input-group-text bg-dark text-white">
            <i class="bi bi-search"></i>
          </span>
          <input
            type="text"
            class="form-control"
            placeholder="Search by title or author..."
            [(ngModel)]="searchTerm"
            (input)="onSearch()">
          <!-- Clear button -->
          <button
            class="btn btn-outline-secondary"
            type="button"
            *ngIf="searchTerm"
            (click)="clearSearch()">
            <i class="bi bi-x-circle"></i>
          </button>
        </div>
      </div>
      <!-- Total count -->
      <div class="col-md-6 d-flex align-items-center">
        <span class="text-muted">
          Showing {{ filteredBooks.length }} of {{ books.length }} books
        </span>
      </div>
    </div>

    <!-- Loading Spinner -->
    <div class="text-center py-5" *ngIf="isLoading">
      <div class="spinner-border text-dark" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-2 text-muted">Loading books...</p>
    </div>

    <!-- Error Message -->
    <div class="alert alert-danger" *ngIf="errorMessage">
      <i class="bi bi-x-circle me-2"></i>{{ errorMessage }}
    </div>

    <!-- No Books Found -->
    <div class="text-center py-5"
      *ngIf="!isLoading && filteredBooks.length === 0">
      <i class="bi bi-book-x display-1 text-muted"></i>
      <h5 class="mt-3 text-muted">No books found</h5>
    </div>

    <!-- Books Grid -->
    <div class="row g-4" *ngIf="!isLoading">
      <div class="col-md-4 col-sm-6"
        *ngFor="let book of filteredBooks">

        <!-- Book Card -->
        <div class="card book-card h-100">
          <div class="card-body">

            <!-- Book Icon + Status Badge -->
            <div class="d-flex justify-content-between align-items-start mb-3">
              <div class="book-icon-wrapper">
                <i class="bi bi-book-fill book-icon"></i>
              </div>
              <span class="badge {{ getStatusBadge(book.availabilityStatus) }}">
                {{ book.availabilityStatus }}
              </span>
            </div>

            <!-- Book Details -->
            <h5 class="card-title fw-bold">{{ book.title }}</h5>
            <p class="text-muted mb-1">
              <i class="bi bi-person me-1"></i>{{ book.author }}
            </p>
            <p class="text-muted mb-1">
              <i class="bi bi-tag me-1"></i>{{ book.category }}
            </p>
            <p class="text-muted mb-3">
              <i class="bi bi-calendar me-1"></i>{{ book.publishedYear }}
            </p>

            <!-- Borrow Button -->
            <button
              class="btn btn-dark w-100"
              [disabled]="book.availabilityStatus !== 'Available'"
              (click)="borrowBook(book.bookId)"
              *ngIf="!isAdmin()">
              <i class="bi bi-download me-2"></i>
              {{ book.availabilityStatus === 'Available' ? 'Borrow Book' : 'Not Available' }}
            </button>

          </div>
        </div>

      </div>
    </div>

  </div>
</div>
