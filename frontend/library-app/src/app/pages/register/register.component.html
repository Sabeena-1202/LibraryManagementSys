<!-- Register Page -->
<div class="register-page">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-80">
      <div class="col-md-5">

        <!-- Register Card -->
        <div class="card register-card">
          <div class="card-body p-5">

            <!-- Header -->
            <div class="text-center mb-4">
              <i class="bi bi-person-plus-fill register-icon"></i>
              <h3 class="mt-2 fw-bold">Create Account</h3>
              <p class="text-muted">Join Library Management System</p>
            </div>

            <!-- Error Alert -->
            <div class="alert alert-danger" *ngIf="errorMessage">
              <i class="bi bi-x-circle me-2"></i>
              {{ errorMessage }}
            </div>

            <!-- Success Alert -->
            <div class="alert alert-success" *ngIf="successMessage">
              <i class="bi bi-check-circle me-2"></i>
              {{ successMessage }}
            </div>

            <!-- Register Form -->
            <form (ngSubmit)="onRegister()">

              <!-- Name Field -->
              <div class="mb-3">
                <label class="form-label fw-semibold">
                  <i class="bi bi-person me-1"></i>Full Name
                </label>
                <input
                  type="text"
                  class="form-control"
                  placeholder="Enter your full name"
                  [(ngModel)]="registerData.name"
                  name="name"
                  required>
              </div>

              <!-- Email Field -->
              <div class="mb-3">
                <label class="form-label fw-semibold">
                  <i class="bi bi-envelope me-1"></i>Email
                </label>
                <input
                  type="email"
                  class="form-control"
                  placeholder="Enter your email"
                  [(ngModel)]="registerData.email"
                  name="email"
                  required>
              </div>

              <!-- Password Field -->
              <div class="mb-3">
                <label class="form-label fw-semibold">
                  <i class="bi bi-lock me-1"></i>Password
                </label>
                <div class="input-group">
                  <input
                    [type]="showPassword ? 'text' : 'password'"
                    class="form-control"
                    placeholder="Min 6 characters"
                    [(ngModel)]="registerData.password"
                    name="password"
                    required>
                  <button
                    class="btn btn-outline-secondary"
                    type="button"
                    (click)="togglePassword()">
                    <i class="bi"
                      [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'">
                    </i>
                  </button>
                </div>
              </div>

              <!-- Confirm Password Field -->
              <div class="mb-4">
                <label class="form-label fw-semibold">
                  <i class="bi bi-lock-fill me-1"></i>Confirm Password
                </label>
                <input
                  [type]="showPassword ? 'text' : 'password'"
                  class="form-control"
                  placeholder="Re-enter your password"
                  [(ngModel)]="confirmPassword"
                  name="confirmPassword"
                  required>
              </div>

              <!-- Register Button -->
              <button
                type="submit"
                class="btn btn-dark w-100 py-2"
                [disabled]="isLoading">
                <span *ngIf="isLoading">
                  <span class="spinner-border spinner-border-sm me-2"></span>
                  Creating account...
                </span>
                <span *ngIf="!isLoading">
                  <i class="bi bi-person-plus me-2"></i>
                  Create Account
                </span>
              </button>

            </form>

            <!-- Login Link -->
            <div class="text-center mt-4">
              <p class="text-muted">
                Already have an account?
                <a routerLink="/login" class="text-dark fw-semibold">
                  Sign in here
                </a>
              </p>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>
</div>
